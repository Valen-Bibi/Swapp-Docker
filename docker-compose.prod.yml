services:
  db:
    image: postgres:15-alpine
    container_name: swapp-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: swapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./swapp-backend
    container_name: swapp-backend
    volumes:
      - ./swapp-backend/uploads:/app/uploads
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@db:5432/swapp_db
      SECRET_KEY: ${SECRET_KEY}
    restart: always

  frontend:
    build:
      context: ./swapp-frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
    container_name: swapp-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
    depends_on:
      - backend
    restart: always

    admin:
    build:
      context: ./swapp-admin-dashboard
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
    container_name: swapp-admin
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}
    depends_on:
      - backend
    restart: always

  npm:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./data/npm:/data
      - ./data/letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
